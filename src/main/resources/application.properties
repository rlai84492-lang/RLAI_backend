spring.application.name=Titan_watch_learning_project

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/titan_bot_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Sam@12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

karix.api.url=${KARIX_API_URL:https://api.karix.io/whatsapp/message}
karix.api.key=${KARIX_API_KEY:}
karix.waba.number=${KARIX_WABA_NUMBER:916366920144}
karix.webhook.dnid=${KARIX_WEBHOOK_DNID:YOUR_WEBHOOK_DNID_HERE}

logging.level.com.example.titan=DEBUG
logging.level.org.springframework.web=INFO