spring.application.name=Titan_watch_learning_project

# ============================================================
# Server
# Local: 8081
# Render: PORT env variable use karega
# ============================================================
server.port=${PORT:8081}

# ============================================================
# Database - MySQL
# Local default: titan_bot_db
# Render: env variables se override hoga
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/titan_bot_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Sam@12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# Karix WhatsApp API
# Keep API key in env variable, not hardcoded
# ============================================================
karix.api.url=${KARIX_API_URL:https://rcmapi.instalerts.zone/services/rcm/sendMessage}
karix.api.key=${KARIX_API_KEY:}
karix.waba.number=${KARIX_WABA_NUMBER:916366920144}

# WebhookDNId is not required right now because Karix has directly
# configured the webhook URL:
# https://rlai-backend-yg4s.onrender.com/webhook
# karix.webhook.dnid=${KARIX_WEBHOOK_DNID:}

# ============================================================
# Webhook Forwarding
# Testing:
#   Render receives webhook and forwards to local/ngrok.
#
# Local:
#   Keep false, because local should process payload and send bot reply.
#
# Render local-testing bridge:
#   WEBHOOK_FORWARD_ENABLED=true
#   WEBHOOK_FORWARD_URL=https://your-ngrok-url.ngrok-free.app/webhook
#
# Production:
#   WEBHOOK_FORWARD_ENABLED=false
# ============================================================
webhook.forward.enabled=${WEBHOOK_FORWARD_ENABLED:false}
webhook.forward.url=${WEBHOOK_FORWARD_URL:}

# ============================================================
# Titan Links / Images
# Optional. Used for catalogue, website redirect and image header.
# ============================================================
titan.catalogue.url=${TITAN_CATALOGUE_URL:https://www.titanwatch.in/birthday-catalogue}
titan.website.url=${TITAN_WEBSITE_URL:https://www.titanwatch.in}
titan.banner.image=${TITAN_BANNER_IMAGE:https://picsum.photos/800/400}

# ============================================================
# CORS - React Dashboard
# ============================================================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ============================================================
# Logging
# ============================================================
logging.level.com.example.titan_watch_learning_project=DEBUG
logging.level.org.springframework.web=INFO
#
